[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["."]
testpaths = ["app"]
python_files = ["test_*.py"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# B008: FastAPI intentionally calls Depends()/Security() in argument defaults.
ignore = ["B008"]

[tool.ruff.lint.per-file-ignores]
"**/tests/*" = ["E501"]
# Agent node files hold long natural-language LLM prompts; don't enforce line length.
"**/graph/nodes/*.py" = ["E501"]
